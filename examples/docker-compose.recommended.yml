services:
  op-reth:
    image: ${OP_RETH_IMAGE}
    container_name: shape-mainnet-op-reth
    restart: unless-stopped
    network_mode: host
    command:
      - node
      - --config=${RETH_CONFIG_FILE}
      - --chain=${GENESIS_L2_FILE}
      - --datadir=${RETH_DATA_DIR}
      - --http
      - --http.addr=127.0.0.1
      - --http.port=${RETH_HTTP_PORT}
      - --ws
      - --ws.addr=127.0.0.1
      - --ws.port=${RETH_WS_PORT}
      - --authrpc.addr=127.0.0.1
      - --authrpc.port=${RETH_AUTH_PORT}
      - --port=${RETH_P2P_PORT}
      - --rollup.sequencer=${SHAPE_SEQUENCER_URL}
      - --rollup.historicalrpc=${SHAPE_HISTORICAL_RPC_URL}
      - --rollup.disable-tx-pool-gossip
      - --disable-discovery
      - --log.stdout.format=log-fmt
      - --log.stdout.filter=info
    volumes:
      - ${RETH_DATA_DIR}:${RETH_DATA_DIR}
      - ${RETH_CONFIG_DIR}:${RETH_CONFIG_DIR}:ro

  op-node:
    image: ${OP_NODE_IMAGE}
    container_name: shape-mainnet-op-node-reth
    restart: unless-stopped
    network_mode: host
    depends_on:
      - op-reth
    command:
      - op-node
      - --l1=${L1_RPC_URL}
      - --l1.rpckind=alchemy
      - --l1.beacon=${L1_BEACON_URL}
      - --l2=http://127.0.0.1:${RETH_AUTH_PORT}
      - --l2.jwt-secret=${JWT_SECRET_PATH}
      - --rollup.config=${ROLLUP_CONFIG_FILE}
      - --datadir=${OP_NODE_DATA_DIR}
      - --l2.enginekind=reth
      - --syncmode=consensus-layer
      - --rpc.addr=127.0.0.1
      - --rpc.port=${OP_NODE_RPC_PORT}
      - --metrics.enabled
      - --metrics.port=${OP_NODE_METRICS_PORT}
      - --p2p.listen.tcp=${OP_NODE_P2P_PORT}
      - --p2p.listen.udp=${OP_NODE_P2P_PORT}
      - --p2p.bootnodes=${OP_NODE_BOOTNODES}
    volumes:
      - ${OP_NODE_DATA_DIR}:${OP_NODE_DATA_DIR}
      - ${RETH_CONFIG_DIR}:${RETH_CONFIG_DIR}:ro

# Notes for first-time operators:
# - Fill in .env first. This compose file is a template, not a drop-in guarantee.
# - Do NOT point these paths at your existing geth datadir.
# - Do NOT reuse default ports if a live geth stack is already on this machine.
# - Keep the JWT secret path and rollup/chain files explicit.
# - Keep explicit stdout logging enabled or `docker logs shape-mainnet-op-reth` may look empty.
# - Judge success by repeated block-number samples, not by whether containers are merely 'Up'.
